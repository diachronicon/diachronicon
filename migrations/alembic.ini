# Alembic configuration for the Diachronicon project.
#
# Run from the project root:
#   alembic -c migrations/alembic.ini upgrade head
#   alembic -c migrations/alembic.ini revision --autogenerate -m "my change"

[alembic]
# Location of the migration scripts, relative to the working directory
# (run alembic from the project root)
script_location = migrations

# The sqlalchemy.url is set programmatically in env.py from config.Config,
# so the value here is intentionally left as a placeholder.
# Do NOT hardcode credentials here.
sqlalchemy.url =

# Optional: filename template for new revision files
# file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Timezone for create_date timestamps
# timezone = UTC

# Maximum length of characters to apply to the "slug" field
truncate_slug_length = 40

# Revision IDs: set to "true" for sequential integers instead of hash
# revision_id_sequence = true

[post_write_hooks]
# No post-write hooks configured

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S